<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="auth-page">

    <div class="glass-card"
         style="width:700px;">

        <h2 class="mb-4">
            Edit Task
        </h2>

        <form method="POST">

            <div class="mb-3">

                <input type="text"
                       name="title"
                       value="{{ task.title }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <input type="text"
                       name="description"
                       value="{{ task.description }}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <select name="priority"
                        class="form-select">

                    <option {% if task.priority == 'High' %}selected{% endif %}>
                        High
                    </option>

                    <option {% if task.priority == 'Medium' %}selected{% endif %}>
                        Medium
                    </option>

                    <option {% if task.priority == 'Low' %}selected{% endif %}>
                        Low
                    </option>

                </select>

            </div>

            <div class="mb-4">

                <select name="status"
                        class="form-select">

                    <option {% if task.status == 'Pending' %}selected{% endif %}>
                        Pending
                    </option>

                    <option {% if task.status == 'Completed' %}selected{% endif %}>
                        Completed
                    </option>

                </select>

            </div>

            <button class="custom-btn">
                Update Task
            </button>

        </form>

    </div>

</div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="auth-page">

    <div class="auth-card">

        <div class="auth-left">

            <h1>
                Join TaskFlow 🚀
            </h1>

            <p>
                Create account and manage tasks
                with modern productivity dashboard.
            </p>

        </div>

        <div class="auth-right">

            <h2>
                Register
            </h2>

            <form method="POST">

                <div class="input-group-custom">

                    <i class="fa-solid fa-user"></i>

                    <input type="text"
                           name="username"
                           placeholder="Username"
                           required>

                </div>

                <div class="input-group-custom">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                           name="password"
                           placeholder="Password"
                           required>

                </div>

                <button class="auth-btn">
                    Register
                </button>

            </form>

            <a href="/"
               class="auth-link">

               Already have account?

            </a>

        </div>

    </div>

</div>

</body>

</html>
